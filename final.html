<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultado - MJ Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>👑 Quiz Finalizado!</h1>

    <button class="btn restart-btn" onclick="restartQuiz()" style="padding:18px 50px; font-size:1.2em;">
      Jogar Novamente
    </button>
  </div>

  <script src="Resultado.js"></script>
</body>
</html>
